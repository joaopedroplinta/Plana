name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API (PHP lint + tests)
    runs-on: ubuntu-latest

    env:
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: agendamentos_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_pgsql, mbstring, xml, ctype, json, bcmath
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: api/vendor
          key: composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        working-directory: api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Configure environment
        working-directory: api
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: agendamentos_test
          DB_USERNAME: postgres
          DB_PASSWORD: secret

      - name: Run migrations
        working-directory: api
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: agendamentos_test
          DB_USERNAME: postgres
          DB_PASSWORD: secret
          APP_ENV: testing

      - name: Run tests
        working-directory: api
        run: php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: agendamentos_test
          DB_USERNAME: postgres
          DB_PASSWORD: secret
          APP_ENV: testing

      - name: Lint PHP (Pint)
        working-directory: api
        run: vendor/bin/pint --test

  web:
    name: Web (TypeScript + lint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: TypeScript check (build)
        working-directory: web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

      - name: Lint
        working-directory: web
        run: npm run lint

  docker:
    name: Docker build (api + web)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build imagem da API
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: false
          cache-from: type=gha,scope=ci-api
          cache-to: type=gha,mode=max,scope=ci-api

      - name: Build imagem do Web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: false
          cache-from: type=gha,scope=ci-web
          cache-to: type=gha,mode=max,scope=ci-web
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.example.com/api/v1

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest

    env:
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: agendamentos_e2e
      DB_USERNAME: postgres
      DB_PASSWORD: secret
      APP_ENV: testing
      # Vários registros/logins de clientes de teste saem do mesmo IP em pouco
      # tempo — afrouxa só aqui o throttle de auth (default de produção é 5/min).
      AUTH_RATE_LIMIT_PER_MINUTE: 100

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: agendamentos_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_pgsql, mbstring, xml, ctype, json, bcmath
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: api/vendor
          key: composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        working-directory: api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Configure API environment
        working-directory: api
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run migrations and seed demo tenant
        working-directory: api
        run: php artisan migrate --seed --force

      - name: Start API (php artisan serve)
        working-directory: api
        run: nohup php artisan serve --port=8000 > /tmp/api-serve.log 2>&1 &

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browsers (chromium only)
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Build web app
        working-directory: web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

      - name: Start web (next start)
        working-directory: web
        run: nohup npm run start -- --port 3000 > /tmp/web-start.log 2>&1 &

      - name: Wait for API and web to respond
        run: |
          echo "Aguardando API em :8000..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/v1/negocio/salao-demo/ping > /dev/null; then
              echo "API respondeu."
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:8000/api/v1/negocio/salao-demo/ping > /dev/null || {
            echo "API não respondeu a tempo."; cat /tmp/api-serve.log; exit 1;
          }

          echo "Aguardando web em :3000..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/ > /dev/null; then
              echo "Web respondeu."
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:3000/ > /dev/null || {
            echo "Web não respondeu a tempo."; cat /tmp/web-start.log; exit 1;
          }

      - name: Run Playwright tests
        working-directory: web
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
